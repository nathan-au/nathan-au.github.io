<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="dracula">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nathan Au</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="./assets/chickengrass.png">

        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">

        <script type="importmap"> { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js" } } </script>
    </head>

    <body>

        <script type="module">
            import * as THREE from "three"

            const scene = new THREE.Scene()
            const camera = new THREE.PerspectiveCamera(
                100,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            )

            const renderer = new THREE.WebGLRenderer()
            renderer.setSize(window.innerWidth, window.innerHeight)
            document.body.appendChild(renderer.domElement)

            const loader = new THREE.CubeTextureLoader()
            const cubeTexture = await loader.loadAsync ([
                "assets/panorama/panorama_1.png", //left
                "assets/panorama/panorama_3.png", //right
                "assets/panorama/panorama_4.png", //sky
                "assets/panorama/panorama_5.png", //ground
                "assets/panorama/panorama_0.png", //back
                "assets/panorama/panorama_2.png" //front
            ])
            scene.background = cubeTexture;

            function animate() {
                renderer.render( scene, camera )
                camera.rotation.y -= 0.001
            }
            renderer.setAnimationLoop( animate )

            addEventListener("resize", () => (
                camera.aspect = innerWidth / innerHeight,
                camera.updateProjectionMatrix(),
                renderer.setSize(innerWidth, innerHeight)
            ));
        </script>

        <div class="relative z-1">
            <div class="hero min-h-screen">
                <div class="hero-content flex flex-col gap-20">
                    <div class="flex flex-row gap-20 items-center flex-wrap justify-center">
                        <div class="flex flex-col gap-5 items-center">
                            <h1 class="text-8xl font-bold text-white text-center">Nathan Au</h1>
                            <p class="text-4xl text-white text-center">Software Engineering</p>
                            <p class="text-2xl text-white text-center">Montr&eacute;al, Canada</p>

                            <div id="links-container" class="flex flex-row gap-10 justify-center">
                                <script src="scripts/links.js"></script>
                            </div>
                            <button onclick="document.getElementById('projects').scrollIntoView()" class="btn btn-outline btn-wide mt-10">See Projects</button>
                        </div>
                        <figure id="nathan-container" class="hover-gallery w-85 rounded-2xl">
                            <script src="scripts/nathan.js"></script> 
                        </figure>
                    </div>
                </div>
            </div>

            <div id="projects" class="mx-10">
                <h1 class="text-6xl font-bold text-center py-20 text-white">Projects</h1>
                <div id="projects-container" class="flex flex-wrap gap-5 justify-center">
                    <script src="scripts/projects.js"></script> 

                </div>
            </div>

            <div class="flex justify-center mt-100 pb-5">
                <button onclick="window.scrollTo({top: 0})" class="btn btn-outline btn-wide">Back to Top</button>
            </div>
        </div>
    </body>
</html>
